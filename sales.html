<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dum Spot - Sales Report</title>
    <link rel="stylesheet" href="global.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .admin-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; min-height: 60vh; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .filter-section { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; gap: 10px; align-items: center; }
        .stats-box { background: #2b8a3e; color: white; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        .stats-box h3 { margin: 0; font-size: 24px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 15px; border: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <span class="flame-icon">🔥</span>
        <h1>Dum Spot</h1>
        <div class="restaurant-badge">ADMIN PORTAL</div>
    </div>
    <nav>
        <a href="admin.html">Live Dashboard</a>
        <a href="billing.html">Billing</a>
        <a href="sales.html" class="active">Total Sales</a>
    </nav>
</header>

<div class="admin-container">
    <div class="dashboard-header">
        <h2>Sales Report</h2>
    </div>

    <div class="stats-box">
        <p>Total Revenue</p>
        <h3 id="revenueDisplay">₹0</h3>
    </div>

    <div class="filter-section">
        <input type="date" id="dateFilter">
        <button onclick="filterSales()">Filter</button>
        <button onclick="resetFilters()" style="background:#868e96; color:white; border:none; padding:10px;">Reset</button>
    </div>

    <table>
        <thead>
            <tr><th>Date</th><th>Order ID</th><th>Customer</th><th>Total</th></tr>
        </thead>
        <tbody id="salesBody"></tbody>
    </table>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
      apiKey: "AIzaSyBqW2a1Nu4x4HM8sVaNUz2TvwNYITjj6O8",
      authDomain: "dumspotwebapp.firebaseapp.com",
      projectId: "dumspotwebapp",
      storageBucket: "dumspotwebapp.firebasestorage.app",
      messagingSenderId: "335424837749",
      appId: "1:335424837749:web:e899dc0ffd4896ce1a803c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let allOrders = [];

  async function fetchOrders() {
      try {
          const querySnapshot = await getDocs(collection(db, "orders"));
          allOrders = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          renderTable(allOrders);
      } catch (error) {
          console.error("Firebase Error:", error);
      }
  }

  function renderTable(data) {
      const tbody = document.getElementById('salesBody');
      const revenueDisplay = document.getElementById('revenueDisplay');
      
      if (!tbody) return; 

      let total = 0;
      tbody.innerHTML = data.map(order => {
          const orderTotal = parseFloat(order.total) || 0;
          total += orderTotal;
          // Ensure createdAt is a valid timestamp
          const dateStr = order.createdAt ? new Date(order.createdAt).toLocaleDateString() : "N/A";
          
          return `<tr>
              <td>${dateStr}</td>
              <td>${order.id}</td>
              <td>${order.name || 'Walk-in'}</td>
              <td>₹${orderTotal.toFixed(2)}</td>
          </tr>`;
      }).join('');
      
      if (revenueDisplay) revenueDisplay.innerText = "₹" + total.toLocaleString();
  }

  // Attach functions to window for HTML button access
  window.filterSales = () => {
      const selectedDate = document.getElementById('dateFilter').value;
      if (!selectedDate) return alert("Please select a date");
      const filtered = allOrders.filter(order => {
          if (!order.createdAt) return false;
          return new Date(order.createdAt).toISOString().split('T')[0] === selectedDate;
      });
      renderTable(filtered);
  };

  window.resetFilters = () => {
      document.getElementById('dateFilter').value = "";
      renderTable(allOrders);
  };

  // Execute on load
  fetchOrders();
</script>>
</body>
</html>
